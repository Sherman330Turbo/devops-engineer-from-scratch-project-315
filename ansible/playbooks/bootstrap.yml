- hosts: yandex_cloud
  become: true

  roles:
    - role: geerlingguy.firewall
      vars:
        firewall_flush_rules_and_chains: false
        firewall_allowed_tcp_ports:
          - "22"
          - "80"
          - "443"
          - "8080"
          - "9090"
    - role: geerlingguy.docker
      vars:
        docker_packages_state: present

  tasks:
    - name: Install ACL
      ansible.builtin.package:
        name: acl
        state: present

    - name: Ensure the 'docker' group exists
      ansible.builtin.group:
        name: docker
        state: present

    - name: Add app_user into vps with docker membership
      ansible.builtin.user:
        name: "{{ app_user }}"
        state: present
        create_home: yes
        groups: docker
        append: true

    - name: Create a new directory www at given path
      become: yes
      become_user: "{{ app_user }}"
      ansible.builtin.file:
        path: "/home/{{ app_user }}/.postgresql"
        state: directory
        mode: '0755'

    - name: Download the db sert
      become: yes
      become_user: "{{ app_user }}"
      ansible.builtin.get_url:
        url: "{{ db_sert_url }}"
        dest: "/home/{{ app_user }}/.postgresql/root.crt"
        mode: '0644'
